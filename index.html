<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NyXia Flipbook — Expérience de Lecture Immersive</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- NyXia Design System -->
  <link rel="stylesheet" href="/css/flipbook.css">
</head>
<body class="nx-ambient">
  
  <!-- Canvas étoilé en arrière-plan -->
  <canvas id="starry-canvas"></canvas>
  
  <!-- Header -->
  <header class="nx-header">
    <div class="nx-logo-container">
      <div class="nx-logo-glow"></div>
      <span class="nx-logo-text">NyXia</span>
    </div>
    <nav class="nx-nav-actions">
      <button class="nx-btn-sm nx-btn-accent" id="btn-tts" title="Lecture vocale (Espace)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
        </svg>
        <span>TTS</span>
      </button>
      <button class="nx-btn-sm" id="btn-magnifier" title="Loupe (Alt+Clic)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.35-4.35"></path>
          <path d="m10 8 2 2m-2 0 2-2"></path>
        </svg>
        <span>Loupe</span>
      </button>
      <button class="nx-btn-sm" id="btn-share" title="Partager & Embed">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="18" cy="5" r="3"></circle>
          <circle cx="6" cy="12" r="3"></circle>
          <circle cx="18" cy="19" r="3"></circle>
          <path d="m8.59 13.51 6.83 3.98m-6.83-7.98 6.83-3.98"></path>
        </svg>
        <span>Partager</span>
      </button>
    </nav>
  </header>

  <!-- Conteneur principal du Flipbook -->
  <main class="nx-main">
    <div class="flipbook-container">
      
      <!-- Livre -->
      <div class="flipbook" id="flipbook">
        <!-- Les pages seront générées par JavaScript -->
      </div>

      <!-- Contrôles de navigation -->
      <div class="nx-controls">
        <button class="nx-btn nx-btn-prev" id="btn-prev" disabled>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="m15 18-6-6 6-6"/>
          </svg>
          Précédent
        </button>
        
        <div class="nx-page-indicator">
          <span id="current-page">1</span> / <span id="total-pages">--</span>
        </div>
        
        <button class="nx-btn nx-btn-next" id="btn-next">
          Suivant
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="m9 18 6-6-6-6"/>
          </svg>
        </button>
      </div>

    </div>
  </main>

  <!-- Modal de Partage -->
  <div class="nx-modal-overlay" id="share-modal">
    <div class="nx-modal nx-modal-share">
      <div class="nx-modal-header">
        <h2 class="font-display gradient-text">Partager NyXia Flipbook</h2>
        <button class="nx-btn-close" id="btn-close-modal">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="m18 15-6-6-6 6"/>
          </svg>
        </button>
      </div>
      
      <div class="nx-modal-body">
        <!-- Options de partage réseaux sociaux -->
        <div class="nx-share-options">
          <h3 class="font-tech text-muted" style="font-size: 13px; margin-bottom: 12px;">Réseaux Sociaux</h3>
          
          <div class="nx-toggle-group">
            <label class="nx-toggle">
              <input type="checkbox" id="toggle-facebook" checked>
              <span class="nx-toggle-slider"></span>
              <span class="nx-toggle-label">Facebook</span>
            </label>
            
            <label class="nx-toggle">
              <input type="checkbox" id="toggle-twitter" checked>
              <span class="nx-toggle-slider"></span>
              <span class="nx-toggle-label">Twitter / X</span>
            </label>
            
            <label class="nx-toggle">
              <input type="checkbox" id="toggle-linkedin" checked>
              <span class="nx-toggle-slider"></span>
              <span class="nx-toggle-label">LinkedIn</span>
            </label>
          </div>
          
          <div class="nx-share-buttons" id="share-buttons">
            <button class="nx-btn nx-btn-social" data-social="facebook" disabled>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
              </svg>
              Facebook
            </button>
            <button class="nx-btn nx-btn-social" data-social="twitter" disabled>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
              </svg>
              Twitter
            </button>
            <button class="nx-btn nx-btn-social" data-social="linkedin" disabled>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
              </svg>
              LinkedIn
            </button>
          </div>
        </div>
        
        <!-- Code Embed -->
        <div class="nx-embed-section">
          <h3 class="font-tech text-muted" style="font-size: 13px; margin-bottom: 12px;">Code d'intégration (Embed)</h3>
          <div class="nx-code-block">
            <textarea id="embed-code" readonly></textarea>
            <button class="nx-btn nx-btn-sm nx-btn-accent" id="btn-copy-embed">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
              </svg>
              Copier
            </button>
          </div>
          <p class="text-muted" style="font-size: 12px; margin-top: 8px;">
            Copiez ce code et collez-le dans votre site web pour intégrer le flipbook.
          </p>
        </div>
      </div>
    </div>
  </div>

  <!-- Overlay de protection -->
  <div class="nx-protection-overlay" id="protection-overlay">
    <div class="nx-protection-message">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
      </svg>
      <p>Contenu protégé — NyXia Flipbook</p>
      <p class="text-dim" style="font-size: 12px; margin-top: 8px;">Le partage non autorisé est désactivé</p>
    </div>
  </div>

  <!-- Indicateur TTS -->
  <div class="nx-tts-indicator" id="tts-indicator">
    <div class="nx-tts-wave"></div>
    <div class="nx-tts-wave"></div>
    <div class="nx-tts-wave"></div>
    <span class="nx-tts-text">Lecture en cours...</span>
  </div>

  <!-- Scripts -->
  <script src="/js/starry-bg.js"></script>
  <script src="/js/flipbook.js"></script>
</body>
</html>
